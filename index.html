<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23faf9f5'/%3E%3Cpath d='M32 9c-10.5 0-19 8.5-19 19 0 13.5 19 28 19 28s19-14.5 19-28c0-10.5-8.5-19-19-19z' fill='%23d97757'/%3E%3Ccircle cx='32' cy='27' r='7' fill='%23faf9f5'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="icon.png">
<title>マイマップ一覧</title>
<style>
  :root {
    --bg:#faf9f5; --card:#ffffff; --ink:#141413; --body:#3f3e3a; --sub:#8a887d;
    --line:#e8e6dc; --accent:#d97757; --accent-soft:rgba(217,119,87,.12);
    --on-accent:#faf9f5; --chip-bg:#141413; --chip-fg:#faf9f5; --soft:#eeece2;
    --shadow:0 1px 3px rgba(20,20,19,.07);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#141413; --card:#232220; --ink:#faf9f5; --body:#d5d2c8; --sub:#b0aea5;
      --line:rgba(250,249,245,.12); --accent:#d97757; --accent-soft:rgba(217,119,87,.17);
      --on-accent:#faf9f5; --chip-bg:#e8e6dc; --chip-fg:#141413; --soft:rgba(250,249,245,.10);
      --shadow:0 2px 8px rgba(0,0,0,.4);
    }
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic UI",Meiryo,sans-serif;
    background:var(--bg); color:var(--ink); min-height:100vh;
  }
  header { padding:22px 18px 14px; border-bottom:1px solid var(--line); }
  header h1 { font-size:19px; font-weight:700; letter-spacing:.01em; }
  header h1 span { color:var(--accent); }
  header .sub { color:var(--sub); font-size:11.5px; margin-top:4px; }
  main { max-width:560px; margin:0 auto; padding:14px; }
  .master {
    display:block; text-decoration:none; text-align:center;
    background:var(--accent); color:var(--on-accent); font-size:14.5px; font-weight:700;
    padding:14px; border-radius:14px; margin-bottom:14px; box-shadow:var(--shadow);
  }
  .master small { display:block; color:rgba(255,255,255,.85); font-weight:400; font-size:11px; margin-top:3px; }
  .card {
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:15px 17px; margin-bottom:11px; box-shadow:var(--shadow);
  }
  .chips { display:flex; gap:6px; margin-bottom:8px; }
  .chip { font-size:11px; padding:3px 10px; border-radius:999px; background:var(--accent-soft); color:var(--accent); font-weight:600; }
  .chip.count { background:var(--soft); color:var(--sub); }
  .card h2 { font-size:15.5px; font-weight:600; }
  .meta { font-size:11.5px; color:var(--sub); margin-top:4px; }
  .btns { display:flex; gap:8px; margin-top:11px; }
  .btns a, .btns button {
    font-size:12.5px; font-weight:600; text-decoration:none; border:none; cursor:pointer;
    padding:8px 16px; border-radius:10px; font-family:inherit;
  }
  .open { background:var(--accent); color:var(--on-accent); }
  .copy { background:var(--soft); color:var(--body); }
  .empty { text-align:center; color:var(--sub); font-size:13px; padding:40px 0; }
  .toast {
    position:fixed; left:50%; bottom:30px; transform:translateX(-50%);
    background:var(--chip-bg); color:var(--chip-fg); font-size:13px;
    padding:10px 18px; border-radius:10px; opacity:0; transition:opacity .3s; pointer-events:none;
  }
  .toast.show { opacity:1; }
</style>
</head>
<body>
<header>
  <h1>マイマップ<span>一覧</span></h1>
  <div class="sub">これまでに作ったお店マップ</div>
</header>
<main>
  <a class="master" href="all.html">全店舗マップを開く<small>これまでの全エリア・全店舗を1枚のマップで（地域フィルタ付き）</small></a>
  <div id="list"></div>
</main>
<div class="toast" id="toast"></div>
<script>
const MAPS = [
 {
  "file": "ueno-asakusa-kameido-kinshicho-oshiage.html",
  "title": "上野・浅草・亀戸 錦糸町・押上",
  "genre": "居酒屋",
  "areas": [
   "上野",
   "浅草",
   "亀戸・錦糸町",
   "押上"
  ],
  "count": 20,
  "created": "2026-06-10",
  "updated": "2026-06-10"
 },
 {
  "file": "kitasenju.html",
  "title": "北千住",
  "genre": "居酒屋",
  "areas": [
   "北千住"
  ],
  "count": 10,
  "created": "2026-06-10",
  "updated": "2026-06-10"
 },
 {
  "file": "machiya.html",
  "title": "町屋",
  "genre": "居酒屋",
  "areas": [
   "町屋駅周辺"
  ],
  "count": 6,
  "created": "2026-06-13",
  "updated": "2026-06-13"
 },
 {
  "file": "togoshi.html",
  "title": "戸越",
  "genre": "おしゃれご飯",
  "areas": [
   "戸越駅・戸越銀座駅周辺"
  ],
  "count": 10,
  "created": "2026-06-13",
  "updated": "2026-06-13"
 }
];
const listEl = document.getElementById('list');
if (!MAPS.length) {
  listEl.innerHTML = '<div class="empty">まだマップがありません</div>';
}
MAPS.slice().reverse().forEach(m => {
  const url = new URL(m.file, location.href).href;
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML =
    '<div class="chips"><span class="chip">' + m.genre + '</span>' +
    '<span class="chip count">' + m.count + '店</span></div>' +
    '<h2>' + m.title + '</h2>' +
    '<div class="meta">' + m.created + ' 作成' + (m.updated && m.updated !== m.created ? '・' + m.updated + ' 更新' : '') + '</div>' +
    '<div class="btns"><a class="open" href="' + m.file + '">マップを開く</a>' +
    '<button class="copy">URLをコピー</button></div>';
  card.querySelector('.copy').onclick = async () => {
    try { await navigator.clipboard.writeText(url); }
    catch(e) {
      const ta = document.createElement('textarea');
      ta.value = url; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); ta.remove();
    }
    const t = document.getElementById('toast');
    t.textContent = 'URLをコピーしました';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  };
  listEl.appendChild(card);
});
</script>
</body>
</html>
