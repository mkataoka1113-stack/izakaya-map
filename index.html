<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイマップ一覧</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic UI","Yu Gothic",Meiryo,sans-serif;
    background:#f4f5f7; color:#1c2333; min-height:100vh;
  }
  header { background:linear-gradient(120deg,#141b2e 0%,#1f2c4d 60%,#2b3a63 100%); padding:20px 18px 16px; }
  header h1 { color:#fff; font-size:18px; font-weight:700; }
  header .sub { color:#c9a227; font-size:11.5px; margin-top:4px; }
  main { max-width:560px; margin:0 auto; padding:14px; }
  .master {
    display:block; text-decoration:none; text-align:center;
    background:#1f2c4d; color:#fff; font-size:14.5px; font-weight:700;
    padding:14px; border-radius:14px; margin-bottom:14px;
    box-shadow:0 2px 10px rgba(20,30,60,.15);
  }
  .master small { display:block; color:#c9a227; font-weight:400; font-size:11px; margin-top:3px; }
  .card {
    background:#fff; border:1px solid #e5e7eb; border-radius:14px;
    padding:15px 17px; margin-bottom:11px; box-shadow:0 2px 10px rgba(20,30,60,.07);
  }
  .chips { display:flex; gap:6px; margin-bottom:8px; }
  .chip { font-size:11px; padding:2px 10px; border-radius:999px; background:#fdf6e3; color:#854f0b; }
  .chip.count { background:#eef1f5; color:#6b7280; }
  .card h2 { font-size:15.5px; font-weight:700; }
  .meta { font-size:11.5px; color:#9aa1ad; margin-top:4px; }
  .btns { display:flex; gap:8px; margin-top:11px; }
  .btns a, .btns button {
    font-size:12.5px; font-weight:700; text-decoration:none; border:none; cursor:pointer;
    padding:8px 16px; border-radius:9px;
  }
  .open { background:#2e8b6e; color:#fff; }
  .copy { background:#eef1f5; color:#475063; }
  .empty { text-align:center; color:#9aa1ad; font-size:13px; padding:40px 0; }
  .toast {
    position:fixed; left:50%; bottom:30px; transform:translateX(-50%);
    background:rgba(28,35,51,.95); color:#fff; font-size:13px;
    padding:10px 18px; border-radius:10px; opacity:0; transition:opacity .3s; pointer-events:none;
  }
  .toast.show { opacity:1; }
</style>
</head>
<body>
<header>
  <h1>マイマップ一覧</h1>
  <div class="sub">これまでに作ったお店マップ</div>
</header>
<main>
  <a class="master" href="all.html">全店舗マップを開く<small>これまでの全エリア・全店舗を1枚のマップで（地域フィルタ付き）</small></a>
  <div id="list"></div>
</main>
<div class="toast" id="toast"></div>
<script>
const MAPS = [
 {
  "file": "ueno-asakusa-kameido-kinshicho-oshiage.html",
  "title": "上野・浅草・亀戸 錦糸町・押上",
  "genre": "居酒屋",
  "areas": [
   "上野",
   "浅草",
   "亀戸・錦糸町",
   "押上"
  ],
  "count": 20,
  "created": "2026-06-10",
  "updated": "2026-06-10"
 },
 {
  "file": "kitasenju.html",
  "title": "北千住",
  "genre": "居酒屋",
  "areas": [
   "北千住"
  ],
  "count": 10,
  "created": "2026-06-10",
  "updated": "2026-06-10"
 }
];
const listEl = document.getElementById('list');
if (!MAPS.length) {
  listEl.innerHTML = '<div class="empty">まだマップがありません</div>';
}
MAPS.slice().reverse().forEach(m => {
  const url = new URL(m.file, location.href).href;
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML =
    '<div class="chips"><span class="chip">' + m.genre + '</span>' +
    '<span class="chip count">' + m.count + '店</span></div>' +
    '<h2>' + m.title + '</h2>' +
    '<div class="meta">' + m.created + ' 作成' + (m.updated && m.updated !== m.created ? '・' + m.updated + ' 更新' : '') + '</div>' +
    '<div class="btns"><a class="open" href="' + m.file + '">マップを開く</a>' +
    '<button class="copy">URLをコピー</button></div>';
  card.querySelector('.copy').onclick = async () => {
    try { await navigator.clipboard.writeText(url); }
    catch(e) {
      const ta = document.createElement('textarea');
      ta.value = url; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); ta.remove();
    }
    const t = document.getElementById('toast');
    t.textContent = 'URLをコピーしました';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  };
  listEl.appendChild(card);
});
</script>
</body>
</html>
