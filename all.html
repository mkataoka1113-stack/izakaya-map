<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root, html[data-theme="light"] {
    --bg:#faf9f5; --card:#ffffff; --ink:#141413; --body:#3f3e3a; --sub:#8a887d;
    --line:#e8e6dc; --accent:#d97757; --accent-soft:rgba(217,119,87,.12);
    --on-accent:#faf9f5;
    --chip-bg:#141413; --chip-fg:#faf9f5; --soft:#eeece2;
    --header:rgba(250,249,245,.92); --shadow:0 1px 3px rgba(20,20,19,.07);
    --float:0 4px 16px rgba(20,20,19,.16); --tabact:#141413; --tabact-fg:#faf9f5;
  }
  html[data-theme="dark"] {
    --bg:#141413; --card:#232220; --ink:#faf9f5; --body:#d5d2c8; --sub:#b0aea5;
    --line:rgba(250,249,245,.12); --accent:#d97757; --accent-soft:rgba(217,119,87,.17);
    --on-accent:#faf9f5;
    --chip-bg:#e8e6dc; --chip-fg:#141413; --soft:rgba(250,249,245,.10);
    --header:rgba(20,20,19,.95); --shadow:0 2px 8px rgba(0,0,0,.4);
    --float:0 4px 18px rgba(0,0,0,.55); --tabact:#d97757; --tabact-fg:#faf9f5;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic UI",Meiryo,sans-serif;
    display:flex; flex-direction:column; background:var(--bg); color:var(--ink);
  }
  header {
    background:var(--header); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line); padding:12px 16px 10px; z-index:1050; position:relative;
  }
  .h-row { display:flex; align-items:center; justify-content:space-between; gap:10px; }
  header h1 { font-size:17px; font-weight:700; letter-spacing:.01em; }
  h1 .accent, h1 .gold { color:var(--accent); }
  #themeBtn {
    border:none; cursor:pointer; width:32px; height:32px; border-radius:50%;
    background:var(--soft); color:var(--ink); display:flex; align-items:center; justify-content:center; flex:none;
  }
  header .note { font-size:10.5px; color:var(--sub); margin-top:4px; }
  .chips { display:flex; gap:7px; margin-top:9px; overflow-x:auto; padding-bottom:2px; }
  .chips::-webkit-scrollbar { display:none; }
  .chip {
    border:1px solid var(--line); cursor:pointer; font-size:12px; font-weight:600; white-space:nowrap;
    padding:6px 13px; border-radius:999px; color:var(--body); background:var(--card);
    display:flex; align-items:center; gap:6px; flex:none; transition:all .15s;
  }
  .chip .dot { width:8px; height:8px; border-radius:50%; }
  .chip.active { background:var(--chip-bg); color:var(--chip-fg); border-color:transparent; }
  .container { flex:1; display:flex; min-height:0; position:relative; }
  #map { flex:1; min-width:0; background:var(--bg); }
  aside { width:390px; overflow-y:auto; padding:14px; background:var(--bg); }
  .area-label {
    font-size:11.5px; font-weight:700; color:var(--sub); letter-spacing:.14em;
    margin:16px 4px 9px; display:flex; align-items:center; gap:7px;
  }
  .area-label .dot { width:9px; height:9px; border-radius:50%; }
  .shop {
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    box-shadow:var(--shadow); padding:14px 16px; margin-bottom:11px; cursor:pointer;
    transition:border-color .15s, box-shadow .15s; position:relative;
  }
  .shop.selected { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent), var(--shadow); }
  .shop .top { display:flex; align-items:center; gap:10px; padding-right:40px; }
  .num {
    flex:none; width:24px; height:24px; border-radius:50% 50% 50% 0;
    transform:rotate(-45deg); border:1.5px solid var(--card);
    box-shadow:0 1px 3px rgba(0,0,0,.3); color:#fff;
    display:flex; align-items:center; justify-content:center; margin:2px 2px 0 0;
  }
  .num i {
    transform:rotate(45deg); font-style:normal; font-size:12.5px; font-weight:600;
    font-family:"Hiragino Mincho ProN",Georgia,serif;
  }
  .shop h3 { font-size:15px; font-weight:600; letter-spacing:-.01em; }
  .st-row { display:flex; gap:6px; margin:9px 0 6px; flex-wrap:wrap; }
  .st {
    font-size:11.5px; padding:4px 10px; border-radius:999px; font-weight:600;
    background:var(--chip-bg); color:var(--chip-fg);
  }
  .st.sec { background:var(--soft); color:var(--body); font-weight:500; }
  .lines { font-size:10.5px; color:var(--sub); margin-bottom:7px; }
  .desc { font-size:12.5px; color:var(--body); line-height:1.65; }
  .desc b { font-weight:600; color:var(--ink); }
  .btns { display:flex; gap:7px; margin-top:10px; }
  .btns a, .btns button {
    flex:1; text-align:center; border:none; cursor:pointer; text-decoration:none;
    font-size:12px; font-weight:600; padding:8px 0; border-radius:10px; font-family:inherit;
  }
  .b-map { background:var(--accent); color:var(--on-accent); }
  .b-info { background:var(--accent-soft); color:var(--accent); }
  .b-route { background:var(--soft); color:var(--body); }
  .want {
    position:absolute; top:13px; right:13px; border:none; cursor:pointer;
    width:32px; height:32px; border-radius:50%; background:var(--soft); color:var(--sub);
    display:flex; align-items:center; justify-content:center; transition:all .15s;
  }
  .want.on { background:var(--accent-soft); color:var(--accent); transform:scale(1.08); }
  /* selection bar */
  #selbar {
    position:fixed; left:50%; bottom:16px; z-index:1100;
    transform:translateX(-50%) translateY(140%); visibility:hidden; opacity:0;
    background:var(--chip-bg); color:var(--chip-fg); border-radius:999px;
    box-shadow:var(--float); display:flex; align-items:center; gap:4px;
    padding:8px 10px 8px 18px; transition:all .25s ease; max-width:94vw;
  }
  #selbar.show { transform:translateX(-50%) translateY(0); visibility:visible; opacity:1; }
  #selbar .cnt { font-size:13px; font-weight:600; white-space:nowrap; }
  #selbar .cnt b { color:var(--accent); }
  #selbar button {
    border:none; cursor:pointer; font-size:12.5px; font-weight:700; font-family:inherit;
    padding:8px 15px; border-radius:999px; margin-left:6px; white-space:nowrap;
  }
  #selbar .send { background:var(--accent); color:var(--on-accent); }
  #selbar .copy { background:rgba(127,127,127,.25); color:var(--chip-fg); }
  #tabs { display:none; }
  /* map pins */
  .pin {
    width:30px; height:30px; border-radius:50% 50% 50% 0;
    transform:rotate(-45deg); border:2px solid #FFFEFA;
    box-shadow:0 2px 6px rgba(0,0,0,.35);
    display:flex; align-items:center; justify-content:center;
  }
  html[data-theme="dark"] .pin { border-color:#E8E2D4; }
  .pin span {
    transform:rotate(45deg); color:#fff; font-size:12.5px; font-weight:600;
    font-family:"Hiragino Mincho ProN",Georgia,serif;
    display:flex; align-items:center; justify-content:center;
  }
  .stpin {
    background:var(--chip-bg); color:var(--chip-fg); font-size:10.5px; font-weight:700;
    padding:3px 8px; border-radius:7px; white-space:nowrap; box-shadow:0 1px 4px rgba(0,0,0,.3);
    border:1px solid rgba(127,127,127,.25); letter-spacing:.02em;
  }
  .leaflet-popup-content-wrapper { border-radius:14px; background:var(--card); color:var(--ink); box-shadow:var(--float); }
  .leaflet-popup-tip { background:var(--card); }
  .leaflet-popup-content { font-size:12.5px; line-height:1.6; margin:14px 16px; }
  .leaflet-popup-content h3 { font-size:14.5px; margin-bottom:5px; font-weight:600; padding-right:10px; }
  .leaflet-popup-content .p-st { margin-bottom:5px; }
  .leaflet-popup-content .p-links { margin-top:7px; display:flex; gap:7px; }
  .leaflet-popup-content .p-links a {
    flex:1; text-align:center; font-size:11.5px; font-weight:600; text-decoration:none;
    padding:6px 0; border-radius:8px; background:var(--accent-soft); color:var(--accent);
  }
  .leaflet-popup-content .p-want {
    border:none; cursor:pointer; border-radius:8px; padding:6px 12px; font-size:12px; font-weight:700;
    background:var(--soft); color:var(--sub); margin-top:7px; font-family:inherit;
    display:inline-flex; align-items:center; gap:5px;
  }
  .leaflet-popup-content .p-want.on { background:var(--accent-soft); color:var(--accent); }
  .leaflet-container a.leaflet-popup-close-button {
    color:var(--sub); font-size:24px; width:36px; height:36px;
    display:flex; align-items:center; justify-content:center; top:2px; right:2px;
  }
  .toast {
    position:fixed; left:50%; bottom:84px; transform:translateX(-50%);
    background:var(--chip-bg); color:var(--chip-fg); font-size:13px;
    padding:10px 18px; border-radius:10px; z-index:1200; opacity:0;
    transition:opacity .3s; pointer-events:none; white-space:nowrap; box-shadow:var(--float);
  }
  .toast.show { opacity:1; }
  .icon { vertical-align:-2px; }
  html[data-theme="dark"] .leaflet-tile-pane { filter:invert(1) hue-rotate(180deg) brightness(.95) contrast(.9); }
  @media (max-width: 800px) {
    header h1 { font-size:16px; }
    .container { flex-direction:column; }
    #map { height:100%; }
    aside { display:none; width:100%; height:100%; padding:12px 12px 96px; }
    body.list-mode #map { display:none; }
    body.list-mode aside { display:block; }
    #tabs {
      display:flex; position:fixed; left:50%; transform:translateX(-50%);
      bottom:16px; z-index:1000; background:var(--card); border:1px solid var(--line);
      border-radius:999px; box-shadow:var(--float); padding:3px;
    }
    body.has-sel #tabs { bottom:78px; }
    #tabs button {
      border:none; cursor:pointer; font-size:12.5px; font-weight:600; font-family:inherit;
      padding:9px 26px; background:transparent; color:var(--sub); border-radius:999px;
    }
    #tabs button.active { background:var(--tabact); color:var(--tabact-fg); }
    #selbar { bottom:14px; }
  }
</style>

const THEME_KEY = 'izakaya_theme';
const svgIcon = (paths, size) =>
  '<svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
  'stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="' + size + '" height="' + size + '">' +
  paths + '</svg>';
const I_THUMB = sz => svgIcon('<path d="M7 10v12"/><path d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2a3.13 3.13 0 0 1 3 3.88Z"/>', sz);
const I_MOON = svgIcon('<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>', 16);
const I_SUN = svgIcon('<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>', 16);

let theme;
try { theme = localStorage.getItem(THEME_KEY); } catch(e) {}
if (theme !== 'light' && theme !== 'dark') {
  theme = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
}
let tileLayer = null;
function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').innerHTML = (t === 'dark') ? I_SUN : I_MOON;
  try { localStorage.setItem(THEME_KEY, t); } catch(e) {}
  if (tileLayer) tileLayer.setUrl(tileUrl());
}
const tileUrl = () => (theme === 'dark')
  ? 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'
  : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
document.documentElement.setAttribute('data-theme', theme);

// ---- 地図 ----
const map = L.map('map', { zoomControl:false });
L.control.zoom({ position:'bottomright' }).addTo(map);
tileLayer = L.tileLayer(tileUrl(), {
  maxZoom: 20, subdomains: 'abcd',
  attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
}).addTo(map);

// 駅マーカー（駅名ラベルを常時表示）
STATIONS.forEach(s => {
  L.marker([s.lat, s.lng], {
    icon: L.divIcon({ className:'', html:'<div class="stpin">' + s.name + '</div>',
      iconSize:null, iconAnchor:[24, 11] }),
    interactive:false, zIndexOffset:-100
  }).addTo(map);
});

const gmapUrl = s => 'https://www.google.com/maps/search/' + encodeURIComponent(s.n + ' ' + s.a);
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
const routeUrl = s => isIOS
  ? 'maps://?daddr=' + encodeURIComponent(s.n + ' ' + s.a)
  : 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(s.n + ' ' + s.a);
const shopId = s => s.n;

let wants = [];
try { wants = JSON.parse(localStorage.getItem('izakaya_wants') || '[]'); } catch(e) {}
const saveWants = () => { try { localStorage.setItem('izakaya_wants', JSON.stringify(wants)); } catch(e) {} };
const isWanted = s => wants.includes(shopId(s));

const stBadges = (s, cls) => {
  if (!s.st || !s.st.length) return '';
  return '<div class="' + (cls || 'st-row') + '">' +
    s.st.map((x, i) => '<span class="st' + (i ? ' sec' : '') + '">' + x.name + ' 徒歩約' + x.min + '分</span>').join('') +
    '</div>';
};
const stLines = s => {
  if (!s.st || !s.st.length) return '';
  const seen = [];
  s.st.forEach(x => { if (!seen.includes(x.line)) seen.push(x.line); });
  return '<div class="lines">' + seen.join('｜') + '</div>';
};

const listEl = document.getElementById('list');
const chipsEl = document.getElementById('chips');
const layerGroups = {}, sections = {};
const allShops = [];
let activeArea = null;

const TAG1 = '名物', TAG2 = 'お酒';

AREAS.forEach(area => {
  const group = L.layerGroup().addTo(map);
  layerGroups[area.name] = group;

  const chip = document.createElement('button');
  chip.className = 'chip';
  chip.dataset.area = area.name;
  chip.innerHTML = '<span class="dot" style="background:' + area.color + '"></span>' + area.name;
  chip.onclick = () => toggleArea(area.name);
  chipsEl.appendChild(chip);

  const section = document.createElement('div');
  sections[area.name] = section;
  const label = document.createElement('div');
  label.className = 'area-label';
  label.innerHTML = '<span class="dot" style="background:' + area.color + '"></span>' + area.name;
  section.appendChild(label);

  area.shops.forEach((s, i) => {
    s.area = area.name; s.color = area.color; s.idx = i + 1;
    allShops.push(s);

    const icon = wanted => L.divIcon({
      className: '',
      html: '<div class="pin' + (wanted ? ' wanted' : '') + '" style="background:' + area.color + '">' +
            '<span>' + (wanted ? I_THUMB(13) : s.idx) + '</span></div>',
      iconSize:[30,30], iconAnchor:[15,30], popupAnchor:[0,-30]
    });
    const marker = L.marker([s.lat, s.lng], { icon: icon(isWanted(s)) });
    s._marker = marker; s._icon = icon;
    marker.addTo(group);

    marker.bindPopup(() =>
      '<h3>' + s.n + '</h3>' +
      stBadges(s, 'st-row p-st') +
      '<div class="desc"><b>' + TAG1 + '</b>：' + s.m + '<br><b>' + TAG2 + '</b>：' + s.d + '</div>' +
      '<div class="p-links"><a href="' + s.u + '" target="_blank" rel="noopener">店舗情報</a>' +
      '<a href="' + routeUrl(s) + '" target="_blank" rel="noopener">経路</a></div>' +
      '<button class="p-want' + (isWanted(s) ? ' on' : '') + '" onclick="toggleWant(\'' +
      shopId(s).replace(/'/g, "\\'") + '\')">' + I_THUMB(14) + (isWanted(s) ? ' 行きたい！' : ' 行きたい') + '</button>'
    );

    const card = document.createElement('div');
    card.className = 'shop';
    s._card = card;
    card.innerHTML =
      '<div class="top"><span class="num" style="background:' + area.color + '"><i>' + s.idx + '</i></span>' +
      '<h3>' + s.n + '</h3></div>' +
      '<button class="want' + (isWanted(s) ? ' on' : '') + '" title="行きたい">' + I_THUMB(16) + '</button>' +
      stBadges(s) + stLines(s) +
      '<div class="desc"><b>' + TAG1 + '</b>：' + s.m + '　<b>' + TAG2 + '</b>：' + s.d + '</div>' +
      '<div class="btns"><button class="b-map">地図で見る</button>' +
      '<a class="b-info" href="' + s.u + '" target="_blank" rel="noopener">店舗情報</a>' +
      '<a class="b-route" href="' + routeUrl(s) + '" target="_blank" rel="noopener">経路</a></div>';
    const flyTo = () => {
      document.querySelectorAll('.shop.selected').forEach(el => el.classList.remove('selected'));
      card.classList.add('selected');
      if (document.body.classList.contains('list-mode') && window.innerWidth <= 800) showTab('map');
      map.flyTo([s.lat, s.lng], 17, { duration:.6 });
      setTimeout(() => marker.openPopup(), 650);
    };
    card.querySelector('.want').addEventListener('click', e => { e.stopPropagation(); toggleWant(shopId(s)); });
    card.querySelector('.b-map').addEventListener('click', e => { e.stopPropagation(); flyTo(); });
    card.addEventListener('click', e => {
      if (e.target.closest('a') || e.target.closest('button')) return;
      flyTo();
    });

    marker.on('popupopen', () => {
      document.querySelectorAll('.shop.selected').forEach(el => el.classList.remove('selected'));
      card.classList.add('selected');
      card.scrollIntoView({ behavior:'smooth', block:'center' });
    });

    section.appendChild(card);
  });
  listEl.appendChild(section);
});

map.fitBounds(allShops.map(s => [s.lat, s.lng]), { padding:[40,40] });

function toggleWant(id) {
  const s = allShops.find(x => shopId(x) === id);
  if (!s) return;
  const pos = wants.indexOf(id);
  if (pos >= 0) wants.splice(pos, 1); else wants.push(id);
  saveWants();
  const on = isWanted(s);
  s._card.querySelector('.want').classList.toggle('on', on);
  s._marker.setIcon(s._icon(on));
  if (s._marker.isPopupOpen()) { s._marker.closePopup(); s._marker.openPopup(); }
  updateSelbar();
}
window.toggleWant = toggleWant;

const selbar = document.getElementById('selbar');
document.getElementById('selThumb').innerHTML = I_THUMB(14);
function updateSelbar() {
  document.getElementById('selCount').textContent = wants.length;
  selbar.classList.toggle('show', wants.length > 0);
  document.body.classList.toggle('has-sel', wants.length > 0);
}

  const lines = ['【行きたいお店ピックアップ】'];
  AREAS.forEach(area => {
    area.shops.filter(isWanted).forEach(s => {
      const st = (s.st && s.st[0]) ? '（' + s.st[0].name + ' 徒歩約' + s.st[0].min + '分）' : '';
      lines.push('👍 ' + s.n + st);
      lines.push('　' + s.a);
      lines.push('　' + gmapUrl(s));
    });
  });
  if (location.protocol.startsWith('http')) lines.push('', 'マップ：' + location.href);
  return lines.join('\n');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
document.getElementById('btnShare').onclick = async () => {
  const text = buildShareText();
  if (navigator.share) { try { await navigator.share({ text }); } catch(e) {} }
  else { await copyText(text); showToast('コピーしました（LINE等に貼り付けてください）'); }
};
document.getElementById('btnCopy').onclick = async () => {
  await copyText(buildShareText()); showToast('コピーしました');
};
async function copyText(text) {
  try { await navigator.clipboard.writeText(text); }
  catch(e) {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); ta.remove();
  }
}

function toggleArea(name) {
  activeArea = (activeArea === name) ? null : name;
  AREAS.forEach(area => {
    const show = !activeArea || area.name === activeArea;
    sections[area.name].style.display = show ? '' : 'none';
    if (show) layerGroups[area.name].addTo(map);
    else map.removeLayer(layerGroups[area.name]);
  });
  document.querySelectorAll('.chip').forEach(c =>
    c.classList.toggle('active', c.dataset.area === activeArea));
  const pts = [];
  AREAS.forEach(a => {
    if (!activeArea || a.name === activeArea) a.shops.forEach(s => pts.push([s.lat, s.lng]));
  });
  map.flyToBounds(pts, { padding:[40,40], duration:.6 });
}

const tabMap = document.getElementById('tabMap');
const tabList = document.getElementById('tabList');
function showTab(which) {
  document.body.classList.toggle('list-mode', which === 'list');
  tabMap.classList.toggle('active', which === 'map');
  tabList.classList.toggle('active', which === 'list');
  if (which === 'map') setTimeout(() => map.invalidateSize(), 50);
}
tabMap.onclick = () => showTab('map');
tabList.onclick = () => showTab('list');

document.getElementById('themeBtn').onclick = () => applyTheme(theme === 'dark' ? 'light' : 'dark');
applyTheme(theme);
updateSelbar();
</script>
</body>
